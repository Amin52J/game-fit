<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14142e"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#9ba6ff"/>
      <stop offset="100%" stop-color="#6e7ae0"/>
    </linearGradient>
    <linearGradient id="check" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5efa9e"/>
      <stop offset="100%" stop-color="#22dd70"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <rect width="512" height="512" rx="108" fill="none" stroke="#252550" stroke-width="2"/>

  <!-- Controller group — scaled and centered, shifted slightly up-left for badge room -->
  <g transform="translate(256,256) scale(0.74) translate(-265,-255)">

    <!-- Controller body (filled) -->
    <path d="M467.51,248.83c-18.4-83.18-45.69-136.24-89.43-149.17A91.5,91.5,0,0,0,352,96c-26.89,0-48.11,16-96,16s-69.15-16-96-16a99.09,99.09,0,0,0-27.2,3.66C89,112.59,61.94,165.7,43.33,248.83c-19,84.91-15.56,152,21.58,164.88,26,9,49.25-9.61,71.27-37,25-31.2,55.79-40.8,119.82-40.8s93.62,9.6,118.66,40.8c22,27.41,46.11,45.79,71.42,37.16C487.1,399.86,486.52,334.74,467.51,248.83Z"
      fill="url(#accent)"/>

    <!-- Controller outline -->
    <path d="M467.51,248.83c-18.4-83.18-45.69-136.24-89.43-149.17A91.5,91.5,0,0,0,352,96c-26.89,0-48.11,16-96,16s-69.15-16-96-16a99.09,99.09,0,0,0-27.2,3.66C89,112.59,61.94,165.7,43.33,248.83c-19,84.91-15.56,152,21.58,164.88,26,9,49.25-9.61,71.27-37,25-31.2,55.79-40.8,119.82-40.8s93.62,9.6,118.66,40.8c22,27.41,46.11,45.79,71.42,37.16C487.1,399.86,486.52,334.74,467.51,248.83Z"
      fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="6" stroke-miterlimit="10"/>

    <!-- Top highlight -->
    <path d="M467.51,248.83c-18.4-83.18-45.69-136.24-89.43-149.17A91.5,91.5,0,0,0,352,96c-26.89,0-48.11,16-96,16s-69.15-16-96-16a99.09,99.09,0,0,0-27.2,3.66C89,112.59,61.94,165.7,43.33,248.83"
      fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="12" stroke-linecap="round" stroke-miterlimit="10"/>

    <!-- Face buttons (right side) -->
    <circle cx="292" cy="224" r="20" fill="#10102a" opacity="0.6"/>
    <circle cx="336" cy="268" r="20" fill="#10102a" opacity="0.6"/>
    <circle cx="336" cy="180" r="20" fill="#10102a" opacity="0.6"/>
    <circle cx="380" cy="224" r="20" fill="#10102a" opacity="0.6"/>

    <!-- D-pad (left side) -->
    <line x1="160" y1="176" x2="160" y2="272" stroke="#10102a" stroke-opacity="0.6" stroke-width="32" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="208" y1="224" x2="112" y2="224" stroke="#10102a" stroke-opacity="0.6" stroke-width="32" stroke-linecap="round" stroke-linejoin="round"/>

  </g>

  <!-- Checkmark badge -->
  <circle cx="388" cy="388" r="62" fill="#0e0e22"/>
  <circle cx="388" cy="388" r="55" fill="none" stroke="url(#check)" stroke-width="5"/>
  <polyline
    points="360,388 381,411 418,353"
    fill="none"
    stroke="url(#check)"
    stroke-width="10"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
