<!DOCTYPE html>
<html>
<head><title>Steam Login</title></head>
<body>
<p>Completing Steam login&hellip;</p>
<script>
(function () {
  if (!window.__TAURI__) return;

  var params = {};
  var search = new URLSearchParams(window.location.search);
  search.forEach(function (value, key) {
    if (key.indexOf("openid.") === 0) params[key] = value;
  });

  if (Object.keys(params).length > 0) {
    window.__TAURI__.event.emit("steam-auth-callback", params);
  }
})();
</script>
</body>
</html>
