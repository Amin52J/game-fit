<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>GameOrWait — Confirming…</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #08080e;
    color: #e2e4ea;
    font-family: Inter, system-ui, -apple-system, sans-serif;
  }
  .card {
    text-align: center;
    padding: 3rem 2rem;
    max-width: 420px;
  }
  .icon { font-size: 2.5rem; margin-bottom: 1rem; }
  h1 { font-size: 1.25rem; font-weight: 600; margin-bottom: .5rem; }
  p { font-size: .9rem; color: #8b8fa3; line-height: 1.5; }
  .error { color: #f87171; }
</style>
</head>
<body>
<div class="card" id="card">
  <div class="icon" id="icon">&#8987;</div>
  <h1 id="title">Verifying…</h1>
  <p id="msg">Please wait while we confirm your email.</p>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
(function () {
  var params = new URLSearchParams(window.location.search);
  var tokenHash = params.get("token_hash");
  var type = params.get("type") || "signup";
  var redirectTo = params.get("redirect_to") || "/";

  var icon = document.getElementById("icon");
  var title = document.getElementById("title");
  var msg = document.getElementById("msg");

  if (!tokenHash) {
    icon.textContent = "\u2716";
    title.textContent = "Invalid link";
    msg.innerHTML = '<span class="error">This verification link is invalid or has expired.</span>';
    return;
  }

  var supabaseUrl = "https://pciotduicyvvnyhshcke.supabase.co";
  var supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBjaW90ZHVpY3l2dm55aHNoY2tlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1MDQzOTIsImV4cCI6MjA5MTA4MDM5Mn0.SGwNEToVkxi0Gh_pixrVw9pdB7wJP4G4CeEVh8FZMzU";
  var sb = supabase.createClient(supabaseUrl, supabaseKey);

  sb.auth.verifyOtp({ token_hash: tokenHash, type: type }).then(function (result) {
    if (result.error) {
      icon.textContent = "\u2716";
      title.textContent = "Verification failed";
      msg.innerHTML = '<span class="error">' + result.error.message + "</span>";
    } else {
      icon.textContent = "\u2713";
      title.textContent = "Email confirmed!";
      msg.textContent = "Redirecting\u2026";
      setTimeout(function () {
        window.location.href = redirectTo;
      }, 1500);
    }
  });
})();
</script>
</body>
</html>
