<!DOCTYPE html>
<html>
<head><title>Signing in…</title></head>
<body>
<p>Completing sign-in&hellip;</p>
<script>
(function () {
  var hash = window.location.hash.substring(1);
  var hashParams = new URLSearchParams(hash);
  var queryParams = new URLSearchParams(window.location.search);

  var payload = {};

  if (hashParams.get("access_token")) {
    payload.access_token = hashParams.get("access_token");
    payload.refresh_token = hashParams.get("refresh_token");
  } else if (queryParams.get("code")) {
    payload.code = queryParams.get("code");
  }

  if (window.__TAURI__ && Object.keys(payload).length > 0) {
    window.__TAURI__.event.emit("oauth-callback", payload);
  }
})();
</script>
</body>
</html>
